name: Build Spaceranger

on:
  push:
    branches:
      - main
    paths:
      - 'spaceranger/Dockerfile'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_MB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_MB_PASS }}

    - name: Set up Docker Buildx 
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./spaceranger    
        file: ./spaceranger/Dockerfile  
        push: true
        platforms: linux/amd64
        tags: ${{ secrets.DOCKERHUB_MB_USERNAME }}/spaceranger:4.0.1
        build-args: | 
          SPACERANGER_URL=${{ secrets.SPACERANGER_URL }}

        
